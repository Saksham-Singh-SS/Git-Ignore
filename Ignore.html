<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Ignore</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #18c574;
        }

        header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #084298;
        }

        footer {
            text-align: center;
            padding: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Small Website</h1>
        <p>HTML + CSS Example</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Welcome👋</h2>
            <p>
                This is a simple HTML page with internal CSS.
                It is clean, responsive, and easy to understand.
            </p>
            <button>Click Me</button>
        </div>
    </div>

    <footer>
        © 2026 Git Ignore
    </footer>

</body>
</html>
